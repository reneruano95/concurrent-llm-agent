<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Art Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        svg { width: 100%; height: 100%; }
    </style>

</head>
<body class="bg-white text-gray-900 min-h-screen">
    <div class="mx-auto px-8 py-16" style="max-width: 1920px;">
        <h1 class="text-4xl font-bold text-center mb-2 text-gray-900">
            SVG Art Gallery
        </h1>
        <p class="text-center text-gray-500 text-base mb-12">Technology and AI</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 hover:shadow-md transition-all">
<div class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Agent 1</div>
<div class="w-full aspect-square flex items-center justify-center p-2"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Substrate / Package Body -->
  <rect x="30" y="30" width="60" height="60" rx="2" fill="#1e272e" />
  
  <!-- Pins (Top) -->
  <rect x="35" y="24" width="6" height="6" fill="#f1c40f" />
  <rect x="47" y="24" width="6" height="6" fill="#f1c40f" />
  <rect x="59" y="24" width="6" height="6" fill="#f1c40f" />
  <rect x="71" y="24" width="6" height="6" fill="#f1c40f" />
  <!-- Pins (Bottom) -->
  <rect x="35" y="90" width="6" height="6" fill="#f1c40f" />
  <rect x="47" y="90" width="6" height=6" fill="#f1c40f" />
  <rect x="59" y="90" width="6" height="6" fill="#f1c40f" />
  <rect x="71" y="90" width="6" height="6" fill="#f1c40f" />
  <!-- Pins (Left) -->
  <rect x="24" y="35" width="6" height="6" fill="#f1c40f" />
  <rect x="24" y="47" width="6" height="6" fill="#f1c40f" />
  <rect x="24" y="59" width="6" height="6" fill="#f1c40f" />
  <rect x="24" y="71" width="6" height="6" fill="#f1c40f" />
  <!-- Pins (Right) -->
  <rect x="90" y="35" width="6" height="6" fill="#f1c40f" />
  <rect x="90" y="47" width="6" height="6" fill="#f1c40f" />
  <rect x="90" y="59" width="6" height="6" fill="#f1c40f" />
  <rect x="90" y="71" width="6" height="6" fill="#f1c40f" />

  <!-- Silicon Die -->
  <rect x="42" y="42" width="36" height="36" rx="1" fill="#00d2ff" opacity="0.8" />
  
  <!-- Circuit Traces -->
  <path d="M 42 50 L 78 50 M 42 60 L 78 60 M 50 42 L 50 78 M 60 42 L 60 78" stroke="#00ff87" stroke-width="1.5" fill="none" />
  <path d="M 42 42 L 55 55 L 78 42 M 42 78 L 55 65 L 78 78" stroke="#00ff87" stroke-width="1.5" fill="none" />
  <circle cx="60" cy="60" r="3" fill="#00ff87" />
</svg></div>
<div class="text-sm font-semibold text-gray-500 mt-3 pt-3 border-t border-gray-200 w-full text-center">A Microchip</div>
            </div>
            <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 hover:shadow-md transition-all">
<div class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Agent 2</div>
<div class="w-full aspect-square flex items-center justify-center p-2"><svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect x="25" y="35" width="70" height="65" rx="10" fill="#7209B7" />
  <rect x="35" y="45" width="50" height="40" rx="5" fill="#E0E1DD" />
  <line x1="60" y1="35" x2="60" y2="15" stroke="#7209B7" stroke-width="4" />
  <circle cx="60" cy="15" r="6" fill="#F72585" />
  <circle cx="47" cy="65" r="6" fill="#4CC9F0" />
  <circle cx="73" cy="65" r="6" fill="#4CC9F0" />
  <rect x="45" y="78" width="30" height="4" rx="2" fill="#3A0CA3" />
  <circle cx="25" cy="60" r="4" fill="#B5179E" />
  <circle cx="95" cy="60" r="4" fill="#B5179E" />
</svg></div>
<div class="text-sm font-semibold text-gray-500 mt-3 pt-3 border-t border-gray-200 w-full text-center">Robot Head</div>
            </div>
            <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 hover:shadow-md transition-all">
<div class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Agent 3</div>
<div class="w-full aspect-square flex items-center justify-center p-2"><svg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'>
  <rect width='120' height='120' fill='#0a051a'/>
  <defs>
    <radialGradient id='glow' cx='50%' cy='50%' r='50%'>
      <stop offset='0%' stop-larity='0.4' stop-color='#7000ff'/>
      <stop offset='100%' stop-color='#0a051a' stop-opacity='0'/>
    </radialGradient>
    <linearGradient id='brainGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='#ff00ff'/>
      <stop offset='100%' stop-color='#00ffff'/>
    </linearGradient>
  </defs>
  <circle cx='60' cy='60' r='55' fill='url(#glow)'/>
  <path d='M60,30 C40,30 30,45 30,60 C30,75 40,90 60,90 C80,90 90,75 90,60 C90,45 80,30 60,30' fill='#1a0b2e' stroke='url(#brainGrad)' stroke-width='2'/>
  <path d='M60,30 Q60,60 30,60 M60,30 Q60,60 90,60 M60,90 Q60,60 30,60 M60,90 Q60,60 90,60' fill='none' stroke='#00ffff' stroke-width='0.5' opacity='0.4'/>
  <g stroke='#00ffff' stroke-width='1.5' fill='none'>
    <polyline points='40,45 60,60 80,45'/>
    <polyline points='40,75 60,60 80,75'/>
    <path d='M35,60 L50,60 M70,60 L85,60 M60,35 L60,50 M60,70 L60,85'/>
  </g>
  <g fill='#fff'>
    <circle cx='40' cy='45' r='2'/>
    <circle cx='80' cy='45' r='2'/>
    <circle cx='40' cy='75' r='2'/>
    <circle cx='80' cy='75' r='2'/>
    <circle cx='60' cy='60' r='3'/>
  </g>
  <circle cx='60' cy='60' r='45' fill='none' stroke='#ff00ff' stroke-width='0.5' opacity='0.3'/>
</svg></div>
<div class="text-sm font-semibold text-gray-500 mt-3 pt-3 border-t border-gray-200 w-full text-center">Digital Brain</div>
            </div>
            <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 hover:shadow-md transition-all">
<div class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Agent 4</div>
<div class="w-full aspect-square flex items-center justify-center p-2"><svg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'><rect width='120' height='120' fill='#0a1f16'/><g stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'><path d='M10 20 L40 20 L60 40 L60 80' stroke='#00ffcc'/><path d='M110 20 L80 20 L60 40 L30 70' stroke='#adff2f'/><path d='M10 100 L40 100 L70 70 L110 70' stroke='#ff00ff'/><path d='M100 110 L80 110 L60 90 L60 50' stroke='#ffff00'/><path d='M20 110 L20 80 L40 60 L70 60' stroke='#00ccff'/></g><g fill='#ffffff'><circle cx='10' cy='20' r='1.5' opacity='0.8'/><circle cx='40' cy='20' r='1.5' opacity='0.8'/><circle cx='60' cy='40' r='1.5' opacity='0.8'/><circle cx='60' cy='80' r='1.5' opacity='0.8'/><circle cx='110' cy='20' r='1.5' opacity='0.8'/><circle cx='80' cy='20' r='1.5' opacity='0.8'/><circle cx='60' cy='40' r='1.5' opacity='0.8'/><circle cx='30' cy='70' r='1.5' opacity='0.8'/><circle cx='10' cy='100' r='1.5' opacity='0.8'/><circle cx='40' cy='100' r='1.5' opacity='0.8'/><circle cx='70' cy='70' r='1.5' opacity='0.8'/><circle cx='110' cy='70' r='1.5' opacity='0.8'/><circle cx='100' cy='110' r='1.5' opacity='0.8'/><circle cx='80' cy='110' r='1.5' opacity='0.8'/><circle cx='60' cy='90' r='1.5' opacity='0.8'/><circle cx='60' cy='50' r='1.5' opacity='0.8'/><circle cx='20' cy='110' r='1.5' opacity='0.8'/><circle cx='20' cy='80' r='1.5' opacity='0.8'/><circle cx='40' cy='60' r='1.5' opacity='0.8'/><circle cx='70' cy='60' r='1.5' opacity='0.8'/></g><g fill='#ffcc00'><circle cx='60' cy='40' r='2.5' opacity='0.4'/><circle cx='60' cy='80' r='2.5' opacity='0.4'/><circle cx='10' cy='100' r='2.5' opacity='0.4'/><circle cx='110' cy='70' r='2.5' opacity='0.4'/></g></svg></div>
<div class="text-sm font-semibold text-gray-500 mt-3 pt-3 border-t border-gray-200 w-full text-center">Circuit Board</div>
            </div>
        </div>
        <p class="text-center text-gray-400 text-xs mt-12 tracking-wide uppercase">
            Generated by 4 concurrent Gemma 4 instances
        </p>
    </div>

</body>
</html>
